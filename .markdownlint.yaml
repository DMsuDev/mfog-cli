# markdownlint configuration
# https://github.com/DavidAnson/markdownlint
default: true

# Allow long lines (common in README tables, links, etc.)
MD013: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow inline HTML (useful for badges, images, etc.)
MD033:
  allowed_elements: [strong, source, div, picture, img, a, br, hr, details, summary, b, td, table, tr, th, h3, p]

# Allow bare URLs
MD034: false

# Allow using multiple top-level headings (e.g., for different sections of the README)
MD041: false

# Allow emphasis used instead of a heading
MD036: false
